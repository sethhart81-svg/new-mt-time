<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;text-align:left;">
<div id="mt-time" style="font-size:20px;padding:10px;"></div>

<script>
function updateMTTime() {
  const now = new Date();
  const timeString = now.toLocaleTimeString("en-US", {
    timeZone: "America/Denver",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  document.getElementById("mt-time").textContent = "Current Time: " + timeString + " MT";
}

updateMTTime();
setInterval(updateMTTime, 1000);
</script>
</body>
</html>
